# Publishes the Alephant n8n community node package to npm on version tag pushes.
#
# n8n Creator Portal verification requires packages to be published from
# GitHub Actions with an npm provenance statement.
#
# Tag format:
#   v0.1.11 publishes the root Alephant package.
#
# One-time npm setup, recommended:
#   npmjs.com package settings > Publish access > Trusted Publishers
#   Add GitHub Actions with:
#     Repository owner: AlephantAI
#     Repository name: alephant-n8n
#     Workflow name: publish.yml
#     Environment: leave blank
#
name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install -g npm@latest

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Resolve package from tag
        id: package
        run: |
          case "$GITHUB_REF_NAME" in
            v*.*.*)
              PACKAGE_DIR="."
              TAG_VERSION="${GITHUB_REF_NAME#v}"
              ;;
            *)
              echo "Unsupported publish tag: $GITHUB_REF_NAME"
              exit 1
              ;;
          esac

          PACKAGE_NAME="$(node -p "require('./${PACKAGE_DIR}/package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./${PACKAGE_DIR}/package.json').version")"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match $PACKAGE_NAME package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

          echo "package-dir=$PACKAGE_DIR" >> "$GITHUB_OUTPUT"
          echo "package-name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "package-version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          echo "Publishing $PACKAGE_NAME@$PACKAGE_VERSION from $PACKAGE_DIR"

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        working-directory: ${{ steps.package.outputs.package-dir }}

      - name: Pack dry run
        run: npm pack --dry-run
        working-directory: ${{ steps.package.outputs.package-dir }}

      - name: Publish
        run: npm publish --access public --provenance
        working-directory: ${{ steps.package.outputs.package-dir }}

      - name: Verify published package with n8n scanner
        run: |
          PACKAGE_SPEC="${{ steps.package.outputs.package-name }}@${{ steps.package.outputs.package-version }}"

          for attempt in 1 2 3; do
            echo "Scanning $PACKAGE_SPEC (attempt $attempt)..."
            if npx --yes @n8n/scan-community-package "$PACKAGE_SPEC"; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep 20
            fi
          done

          exit 1
