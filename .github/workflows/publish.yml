# Publishes this n8n community node package to npm on version tag pushes.
#
# n8n Creator Portal verification requires packages to be published from
# GitHub Actions with an npm provenance statement.
#
# One-time npm setup, recommended:
#   npmjs.com package settings > Publish access > Trusted Publishers
#   Add GitHub Actions with:
#     Repository owner: AlephantAI
#     Repository name: n8n-nodes
#     Workflow name: publish.yml
#     Environment: leave blank
#
name: Publish

on:
  push:
    tags:
      - '*.*.*'
      - 'v*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Update npm
        run: npm install -g npm@latest

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public
